# Fly.io config for the KOS FastAPI backend
app = 'kos-api'
primary_region = 'lax'

[build]
  dockerfile = 'Dockerfile'

[env]
  NEO4J_URI      = 'bolt://kos-neo4j.flycast:7687'
  NEO4J_USER     = 'neo4j'
  CHROMA_MODE    = 'embedded'
  CHROMA_DATA_DIR = '/data/chroma'
  SEED_ON_STARTUP = 'true'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'requests'
    soft_limit = 50
    hard_limit = 100

[[mounts]]
  source = 'kos_data'
  destination = '/data'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
