version: "3.9"

services:
  neo4j:
    image: neo4j:5.20-community
    container_name: kos-neo4j
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: neo4j/kospassword
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: "512m"
      NEO4J_dbms_memory_heap_max__size: "1G"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "kospassword", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  chromadb:
    image: chromadb/chroma:latest
    container_name: kos-chroma
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      CHROMA_SERVER_AUTHN_CREDENTIALS: ""
      ANONYMIZED_TELEMETRY: "false"

  kos-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kos-api
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: kospassword
      CHROMA_HOST: chromadb
      CHROMA_PORT: "8000"
    depends_on:
      neo4j:
        condition: service_healthy
      chromadb:
        condition: service_started
    volumes:
      - ./fixtures:/app/fixtures:ro

volumes:
  neo4j_data:
  neo4j_logs:
  chroma_data:
